<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student Information</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            background-image: url(b1.jpg);
            background-size: cover;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 500px;
            background-image: url(s.jpeg);
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
        }
        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #007bff;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Add Student Information</h2>
        <form action="addstud.php" method="post" autocomplete="off">

            <label for="id">ID:</label>
            <input type="text" id="id" name="id" required>

            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="age">Age:</label>
            <input type="number" id="age" name="age" required>

            <label for="course">Course:</label>
            <select id="course" name="course" required>
                <option value="computer">Computer</option>
                <option value="Electrical">Electrical</option>
                <option value="Civil">Civil</option>
                <option value="Mechanical">Mechanical</option>
                <option value="E&TC">E&TC</option>
                <option value="Auto">Auto </option>
                <!-- Add more options as needed -->
            </select>
            <label for="password">Password:</label>
            <input type="text" id="password" name="password" required>

            <label for="contact">Contact:</label>
            <input type="number" id="contact" name="contact" required>
           
            <button type="submit">Add Student</button>
        </form>
    </div>
    <script>
        // Function to check if user is logged in
        function isLoggedIn() {
            // Simplified logic for testing
            // Always return true for demonstration purposes
            return true;
        }
    
        // Listen for page navigation
        window.addEventListener('pageshow', function(event) {
            console.log('pageshow event triggered');
            if (event.persisted && isLoggedIn()) {
               // console.log('Redirecting to index.html');
                // Navigated with back or forward button and user is logged in
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
