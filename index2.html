<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Attendance</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            background-image: url(b1.jpg);
            background-size: cover;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .attendance-form {
            background-color: #fff;
            background-image: url(s.jpeg);
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .form-group input,
        .form-group select {
            width: 80%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 3px;
            font-size: 16px;
        }
        .form-group button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 3px;
            font-size: 16px;
            cursor: pointer;
        }
        .form-group button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="attendance-form">
        <h2>Student Attendance</h2>
        <form id="attendanceForm" action="process_attendance.php" method="POST" autocomplete="off">
            <div class="form-group">
                <label for="year">Year</label>
                <select id="year" name="year" required>
                    <option value="1">First Year</option>
                    <option value="2">Second Year</option>
                    <option value="3">Third Year</option>
                    <!-- Add more options as needed -->
                </select>
            </div>
            <div class="form-group">
                <label for="rollNumber">Roll Number</label>
                <input type="text" id="rollNumber" name="rollNumber" required>
            </div>
            <div class="form-group">
                <label for="attendanceDate">Attendance Date</label>
                <input type="date" id="attendanceDate" name="attendanceDate" required>
            </div>
            <div class="form-group">
                <label for="isPresent">Is Present?</label>
                <select id="isPresent" name="isPresent" required>
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>
            <div class="form-group">
                <button type="submit">Submit Attendance</button>
            </div>
        </form>
    </div>
    <script>
        // Function to check if user is logged in
        function isLoggedIn() {
            // Simplified logic for testing
            // Always return true for demonstration purposes
            return true;
        }
    
        // Listen for page navigation
        window.addEventListener('pageshow', function(event) {
            console.log('pageshow event triggered');
            if (event.persisted && isLoggedIn()) {
               // console.log('Redirecting to index.html');
                // Navigated with back or forward button and user is logged in
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
